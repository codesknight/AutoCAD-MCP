<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AutoCAD MCP 网页助手</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  .row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
  .row label { flex: 0 0 90px; align-self: center; }
  .row input, .row select { flex: 1; padding: 0.4rem; }
  #log { border: 1px solid #ccc; border-radius: 6px; height: 400px; overflow-y: auto; padding: 0.75rem; margin-bottom: 0.75rem; }
  .msg { margin-bottom: 0.6rem; white-space: pre-wrap; }
  .msg.user { color: #1a5; }
  .msg.assistant { color: #333; }
  #compose { display: flex; gap: 0.5rem; }
  #compose input { flex: 1; padding: 0.5rem; }
  #base_url_row { display: none; }
</style>
</head>
<body>
  <h2>AutoCAD MCP 网页助手</h2>

  <div class="row">
    <label for="provider">模型</label>
    <select id="provider">
      <option value="anthropic">Claude (Anthropic)</option>
      <option value="openai">OpenAI</option>
      <option value="openai_compatible">OpenAI 兼容(通义千问/DeepSeek/智谱...)</option>
    </select>
  </div>
  <div class="row">
    <label for="api_key">API Key</label>
    <input id="api_key" type="password" placeholder="只在本次会话中使用，不会保存">
  </div>
  <div class="row" id="base_url_row">
    <label for="base_url">Base URL</label>
    <input id="base_url" type="text" placeholder="例如 https://dashscope.aliyuncs.com/compatible-mode/v1">
  </div>

  <div id="log"></div>

  <div id="compose">
    <input id="message" type="text" placeholder="用自然语言描述你想在 AutoCAD 里做什么...">
    <button id="send">发送</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
